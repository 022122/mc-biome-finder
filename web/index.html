<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC 群系查找器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: #16213e;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            border-right: 1px solid #0f3460;
        }
        .sidebar h1 {
            font-size: 18px;
            color: #e94560;
            margin-bottom: 4px;
        }
        .sidebar h2 {
            font-size: 14px;
            color: #888;
            font-weight: normal;
            margin-bottom: 8px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group label {
            font-size: 12px;
            color: #aaa;
        }
        .form-group input, .form-group select {
            background: #0f3460;
            border: 1px solid #1a1a4e;
            color: #fff;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 13px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #e94560;
        }
        .form-row {
            display: flex;
            gap: 8px;
        }
        .form-row .form-group { flex: 1; }

        button.primary {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        button.primary:hover { background: #c73652; }
        button.primary:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .status {
            font-size: 12px;
            color: #888;
            min-height: 20px;
        }

        /* Results list */
        .results-title {
            font-size: 14px;
            color: #e94560;
            margin-top: 8px;
        }
        .results-list {
            flex: 1;
            overflow-y: auto;
        }
        .result-item {
            background: #0f3460;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 12px;
        }
        .result-item:hover { background: #1a4080; }
        .result-item .rank {
            color: #e94560;
            font-weight: bold;
        }
        .result-item .coords {
            color: #fff;
            font-weight: bold;
        }
        .result-item .info {
            color: #aaa;
        }

        /* Map area */
        .map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #111;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: pixelated;
        }
        .map-info {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #ccc;
        }
        .map-coords {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #ccc;
        }

        /* Loading overlay */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px 30px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .loading.active { display: block; }

        /* Markers */
        .marker {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid #e94560;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 6px rgba(233, 69, 96, 0.6);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>🗺️ MC 群系查找器</h1>
        <h2>Minecraft Java 群系地图</h2>

        <div class="form-group">
            <label>种子</label>
            <input type="text" id="seed" value="123456789" placeholder="输入世界种子">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>版本</label>
                <select id="version">
                    <option value="1.21">1.21</option>
                    <option value="1.20">1.20</option>
                    <option value="1.19">1.19</option>
                    <option value="1.18" selected>1.18</option>
                    <option value="1.17">1.17</option>
                    <option value="1.16">1.16</option>
                    <option value="1.15">1.15</option>
                    <option value="1.14">1.14</option>
                    <option value="1.12">1.12</option>
                </select>
            </div>
            <div class="form-group">
                <label>群系</label>
                <select id="biome">
                    <option value="14">蘑菇岛 mushroom_fields</option>
                    <option value="185">樱花树林 cherry_grove</option>
                    <option value="186">苍白花园 pale_garden</option>
                    <option value="21">丛林 jungle</option>
                    <option value="37">恶地 badlands</option>
                    <option value="177">草甸 meadow</option>
                    <option value="183">深暗之域 deep_dark</option>
                    <option value="184">红树林沼泽 mangrove_swamp</option>
                    <option value="175">繁茂洞穴 lush_caves</option>
                    <option value="132">繁花森林 flower_forest</option>
                    <option value="140">冰刺 ice_spikes</option>
                    <option value="168">竹林 bamboo_jungle</option>
                    <option value="29">黑森林 dark_forest</option>
                    <option value="6">沼泽 swamp</option>
                    <option value="1">平原 plains</option>
                    <option value="2">沙漠 desert</option>
                    <option value="4">森林 forest</option>
                    <option value="5">针叶林 taiga</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>窗口大小 (区块)</label>
                <input type="number" id="windowSize" value="16" min="4" max="64">
            </div>
            <div class="form-group">
                <label>搜索半径 (方块)</label>
                <input type="number" id="radius" value="10000" min="1000" max="100000" step="1000">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>原点 X</label>
                <input type="number" id="originX" value="0">
            </div>
            <div class="form-group">
                <label>原点 Z</label>
                <input type="number" id="originZ" value="0">
            </div>
        </div>

        <div class="form-group">
            <label>返回数量</label>
            <input type="number" id="count" value="20" min="1" max="100">
        </div>

        <button class="primary" id="searchBtn" disabled>搜索群系</button>
        <button class="primary" id="renderBtn" disabled style="background:#0f3460">刷新地图</button>

        <div class="status" id="status">正在加载 WASM 模块...</div>

        <div class="results-title" id="resultsTitle"></div>
        <div class="results-list" id="resultsList"></div>
    </div>

    <div class="map-container" id="mapContainer">
        <canvas id="mapCanvas"></canvas>
        <div class="map-info" id="mapInfo">缩放: 滚轮 | 拖拽: 鼠标左键</div>
        <div class="map-coords" id="mapCoords">X: 0, Z: 0</div>
        <div class="loading" id="loading">⏳ 生成中...</div>
    </div>

    <script type="module">
        import init, { generate_biome_map, search_biome, get_biome_name } from './pkg/mc_biome_finder_web.js';

        let wasm = null;
        let mapData = null;
        let mapWidth = 0, mapHeight = 0;
        let viewX = 0, viewZ = 0;
        let zoom = 1;
        let isDragging = false;
        let dragStartX = 0, dragStartZ = 0;
        let dragViewX = 0, dragViewZ = 0;
        let markers = [];

        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('mapContainer');

        // Init WASM
        async function initWasm() {
            try {
                wasm = await init();
                document.getElementById('searchBtn').disabled = false;
                document.getElementById('renderBtn').disabled = false;
                document.getElementById('status').textContent = 'WASM 加载完成，可以开始搜索';
                renderMap();
            } catch (e) {
                document.getElementById('status').textContent = '❌ WASM 加载失败: ' + e.message;
                console.error(e);
            }
        }

        function getParams() {
            return {
                seed: parseInt(document.getElementById('seed').value) || 0,
                version: document.getElementById('version').value,
                biome: parseInt(document.getElementById('biome').value),
                windowSize: parseInt(document.getElementById('windowSize').value) || 16,
                radius: parseInt(document.getElementById('radius').value) || 10000,
                originX: parseInt(document.getElementById('originX').value) || 0,
                originZ: parseInt(document.getElementById('originZ').value) || 0,
                count: parseInt(document.getElementById('count').value) || 20,
            };
        }

        function renderMap() {
            const p = getParams();
            const rect = container.getBoundingClientRect();
            const w = Math.ceil(rect.width / zoom);
            const h = Math.ceil(rect.height / zoom);

            // Use scale 16 for overview
            const scale = zoom < 2 ? 64 : zoom < 4 ? 16 : 4;
            const mapW = Math.ceil(w / (scale / zoom));
            const mapH = Math.ceil(h / (scale / zoom));

            const clampedW = Math.min(mapW, 512);
            const clampedH = Math.min(mapH, 512);

            document.getElementById('loading').classList.add('active');

            setTimeout(() => {
                try {
                    const rgba = generate_biome_map(
                        p.seed, p.version, false,
                        Math.floor(viewX), Math.floor(viewZ),
                        clampedW, clampedH, scale
                    );

                    canvas.width = rect.width;
                    canvas.height = rect.height;

                    const imgData = new ImageData(new Uint8ClampedArray(rgba), clampedW, clampedH);
                    const tmpCanvas = document.createElement('canvas');
                    tmpCanvas.width = clampedW;
                    tmpCanvas.height = clampedH;
                    tmpCanvas.getContext('2d').putImageData(imgData, 0, 0);

                    ctx.imageSmoothingEnabled = false;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(tmpCanvas, 0, 0, canvas.width, canvas.height);

                    mapWidth = clampedW;
                    mapHeight = clampedH;
                    mapData = { scale, w: clampedW, h: clampedH };

                    updateMarkers();
                } catch (e) {
                    console.error('Map render error:', e);
                }
                document.getElementById('loading').classList.remove('active');
            }, 10);
        }

        function doSearch() {
            const p = getParams();
            document.getElementById('status').textContent = '搜索中...';
            document.getElementById('searchBtn').disabled = true;

            setTimeout(() => {
                try {
                    const results = search_biome(
                        p.seed, p.version, false,
                        p.biome, p.windowSize,
                        p.originX, p.originZ,
                        p.radius, p.count
                    );

                    markers = results || [];
                    displayResults(results, p.biome, p.windowSize);
                    updateMarkers();
                    document.getElementById('status').textContent =
                        `找到 ${(results || []).length} 个结果`;
                } catch (e) {
                    document.getElementById('status').textContent = '❌ 搜索失败: ' + e.message;
                    console.error(e);
                }
                document.getElementById('searchBtn').disabled = false;
            }, 10);
        }

        function displayResults(results, biomeId, windowSize) {
            const list = document.getElementById('resultsList');
            const title = document.getElementById('resultsTitle');

            if (!results || results.length === 0) {
                title.textContent = '未找到结果';
                list.innerHTML = '';
                return;
            }

            title.textContent = `搜索结果 (${results.length})`;
            list.innerHTML = results.map((r, i) => `
                <div class="result-item" data-x="${r.x}" data-z="${r.z}">
                    <span class="rank">#${i + 1}</span>
                    <span class="coords">(${r.x}, ${r.z})</span>
                    <span class="info">| ${r.biome_chunks} 区块 | ${Math.round(r.distance)}m</span>
                </div>
            `).join('');

            // Click to navigate
            list.querySelectorAll('.result-item').forEach(item => {
                item.addEventListener('click', () => {
                    viewX = parseInt(item.dataset.x);
                    viewZ = parseInt(item.dataset.z);
                    renderMap();
                });
            });
        }

        function updateMarkers() {
            // Remove old markers
            document.querySelectorAll('.marker').forEach(m => m.remove());

            if (!mapData || markers.length === 0) return;

            const rect = container.getBoundingClientRect();
            const scale = mapData.scale;
            const halfW = (mapData.w * scale) / 2;
            const halfH = (mapData.h * scale) / 2;

            markers.forEach(m => {
                const px = ((m.x - viewX + halfW) / (halfW * 2)) * rect.width;
                const py = ((m.z - viewZ + halfH) / (halfH * 2)) * rect.height;

                if (px >= 0 && px <= rect.width && py >= 0 && py <= rect.height) {
                    const el = document.createElement('div');
                    el.className = 'marker';
                    el.style.left = px + 'px';
                    el.style.top = py + 'px';
                    container.appendChild(el);
                }
            });
        }

        // Mouse events for panning
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartZ = e.clientY;
            dragViewX = viewX;
            dragViewZ = viewZ;
            container.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!mapData) return;

            // Update coordinate display
            const rect = container.getBoundingClientRect();
            const relX = (e.clientX - rect.left) / rect.width;
            const relZ = (e.clientY - rect.top) / rect.height;
            const scale = mapData.scale;
            const blockX = Math.floor(viewX + (relX - 0.5) * mapData.w * scale);
            const blockZ = Math.floor(viewZ + (relZ - 0.5) * mapData.h * scale);
            document.getElementById('mapCoords').textContent = `X: ${blockX}, Z: ${blockZ}`;

            if (isDragging) {
                const dx = e.clientX - dragStartX;
                const dz = e.clientY - dragStartZ;
                const moveScale = mapData.scale * mapData.w / rect.width;
                viewX = dragViewX - dx * moveScale;
                viewZ = dragViewZ - dz * moveScale;
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                container.style.cursor = 'default';
                renderMap();
            }
        });

        // Zoom with scroll
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const oldZoom = zoom;
            if (e.deltaY < 0) {
                zoom = Math.min(zoom * 1.5, 32);
            } else {
                zoom = Math.max(zoom / 1.5, 0.25);
            }
            if (zoom !== oldZoom) {
                renderMap();
            }
        });

        // Buttons
        document.getElementById('searchBtn').addEventListener('click', doSearch);
        document.getElementById('renderBtn').addEventListener('click', renderMap);

        // Resize
        window.addEventListener('resize', () => renderMap());

        // Start
        initWasm();
    </script>
</body>
</html>
